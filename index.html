<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">


</head>

<body>
    <!-- container -->
    <div class="outer-container">
        <div class="main">
            <h1 id="app-title">Bookie </h1>
            <p>A collection of sweet reads</p>

            <form id="search-form" action="/search_results.html" method="get">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search"
                    viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                </svg>
                <input type="search" id="search-input" name="search"
                    placeholder="Enter a book title or author's name." />
                <button id="search-button" type="submit">Search</button>
                <button id="addNew-button" type="button" onclick="addBookToLibrary()">New Book</button>
            </form>

            <div id="add-form-container" style="display: none;">
                <div class="add-form-nav">
                    <div class="add-form-title">
                        <h1 id="form-title">Add A New Book</h1>
                    </div>
                    <button id="close-form-button" type="button" onclick="closeForm()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M4 4 L12 12 M12 4 L4 12" />
                        </svg>
                    </button>


                </div>
                <form id="add-form">
                    <div>
                        <label for="book-title">Title of book:</label>
                        <input type="text" name="book-title" id="book-title" minlength="3" maxlength="150" required />
                    </div>
                    <span id="titleError" class="error"></span>

                    <div>
                        <label for="author">Author name:</label>
                        <input type="text" name="author" id="author" minlength="2" maxlength="80" required />
                    </div>
                    <span id="authorError" class="error"></span>

                    <div>
                        <label for="num-of-pages"># of pages:</label>
                        <input type="number" name="num-of-pages" id="num-of-pages" min="10" max="7000" required />
                    </div>
                    <span id="pagesError" class="error"></span>

                    <div>
                        <label for="book-status">Have you read this book?:</label>
                        <select name="book-status" id="book-status" required>
                            <option value="">--Please choose an option--</option>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                    <span id="statusError" class="error"></span>


                    <button id="save-book-button" type="button" onclick="saveBookToLibrary()">Save</button>
                </form>
            </div>

            <table id="library-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th># of Pages</th>
                        <th>Status</th>
                        <th>Modify</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

    <script src="./library.js" defer></script>

</body>

</html>
